{% extends "base.html" %}
{% block title %}Prihlásenie – DZ News{% endblock %}

{% block styles %}
<style>
  .login-outer {
    display: flex;
    justify-content: center;
    padding: 60px 16px 0;
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px 28px 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,.4);
  }
  .login-brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-brand .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .02em;
  }
  .login-brand .sub {
    margin-top: 4px;
    font-size: 12px;
  }
  .login-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .login-field label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .login-field input {
    width: 100%;
    min-width: 0;
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.05);
    color: var(--text);
    transition: border-color .15s;
  }
  .login-field input:focus {
    outline: none;
    border-color: rgba(100,180,255,.5);
    background: rgba(255,255,255,.07);
  }
  .login-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    border: 1px solid rgba(100,180,255,.3);
    background: rgba(100,180,255,.12);
    color: #a8d8ff;
    cursor: pointer;
    margin-top: 8px;
    transition: background .15s, border-color .15s;
  }
  .login-btn:hover {
    background: rgba(100,180,255,.2);
    border-color: rgba(100,180,255,.5);
  }
</style>
{% endblock %}

{% block content %}
<div class="login-outer">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo">DZ News</div>
      <div class="sub">monitoring • Slovakia–Algeria</div>
    </div>

    <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="login-field">
        <label for="username">Meno</label>
        <input id="username" name="username" type="text"
               autocomplete="username" autofocus required>
      </div>
      <div class="login-field">
        <label for="password">Heslo</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Prihlásiť sa</button>
    </form>
  </div>
</div>
{% endblock %}
