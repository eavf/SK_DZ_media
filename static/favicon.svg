<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#161622"/>

  <!-- Newspaper page -->
  <rect x="4" y="4" width="17" height="22" rx="2" fill="#dde1f0"/>
  <!-- Header bar -->
  <rect x="4" y="4" width="17" height="5" rx="2" fill="#b0b8d8"/>
  <rect x="4" y="7" width="17" height="2" fill="#b0b8d8"/>
  <!-- Text lines -->
  <rect x="7" y="12" width="11" height="1.5" rx="0.75" fill="#9099b8"/>
  <rect x="7" y="15" width="9"  height="1.5" rx="0.75" fill="#9099b8"/>
  <rect x="7" y="18" width="11" height="1.5" rx="0.75" fill="#9099b8"/>
  <rect x="7" y="21" width="7"  height="1.5" rx="0.75" fill="#9099b8"/>

  <!-- Magnifying glass circle -->
  <circle cx="21" cy="21" r="7" fill="#161622" stroke="none"/>
  <circle cx="21" cy="21" r="5.5" fill="none" stroke="#4aa0ff" stroke-width="2.2"/>

  <!-- Handle -->
  <line x1="25.2" y1="25.2" x2="29" y2="29" stroke="#4aa0ff" stroke-width="2.4" stroke-linecap="round"/>
</svg>